# autovest — 원클릭 실행
#   cp .env.example .env   # 토스/키움 키 입력
#   로컬(빌드):   docker compose up -d --build
#   서버(배포):   docker compose pull && docker compose up -d   # ghcr.io 이미지 당겨서 실행
# → http://localhost:8080 (서버 자신만 접근). 외부는 SSH터널/Tailscale. 절대 0.0.0.0 금지.
services:
  backend:
    image: ghcr.io/sangholee235/tossapi-backend:latest   # CI가 올린 이미지(서버는 pull)
    build: ./backend                                      # 로컬은 여기서 빌드
    env_file: .env          # 토스 키를 환경변수로 주입 (이미지에 굽지 않음)
    environment:
      - TOSSAPI_DATA_DIR=/appdata
      - TZ=Asia/Seoul
    volumes:
      - bot_data:/appdata    # 봇 설정·체결기록 영속화 (재배포해도 유지)
    restart: unless-stopped  # 크래시·재부팅 후 자동 재기동 (24h 적립봇)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    image: ghcr.io/sangholee235/tossapi-frontend:latest
    build: ./frontend
    ports:
      - "127.0.0.1:8080:80"  # 서버 자신만 접근(외부 노출 X). SSH터널/Tailscale로 접속
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  bot_data:
