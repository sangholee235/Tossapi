server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 서비스워커·매니페스트·인덱스는 캐시 금지 → 새 배포가 바로 반영 (PWA autoUpdate)
    location = /sw.js              { add_header Cache-Control "no-cache"; }
    location = /registerSW.js     { add_header Cache-Control "no-cache"; }
    location = /manifest.webmanifest { add_header Cache-Control "no-cache"; }
    location = /index.html        { add_header Cache-Control "no-cache"; }

    # 정적 자산 (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API → 백엔드 컨테이너로 프록시 (단일 출처, CORS 불필요)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;      # 실시간 SSE(/api/bot/stream) 장시간 연결 유지
        proxy_buffering off;           # SSE 즉시 전달 (버퍼링 방지)
    }
}
