server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 정적 자산 (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API → 백엔드 컨테이너로 프록시 (단일 출처, CORS 불필요)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }
}
